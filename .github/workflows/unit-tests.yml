name: Unit Tests
on: push

jobs:
  greeting: 
    runs-on: ubuntu-latest
    steps: 
      - name: Greeting!
        run: echo hello world

  test-python-3-14:
    name: Test Python 3.14
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
        
      - name: Install package
        run: python -m pip install -e .[test]

      - name: Test package  
        run: python -m pytest